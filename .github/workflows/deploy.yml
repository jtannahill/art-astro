name: deploy preview

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  S3_BUCKET: art-generator-216890068001
  S3_PREFIX: site/next
  CLOUDFRONT_DISTRIBUTION_ID: E1ZBBUI25FIV7
  INVALIDATION_PATHS: /next/*

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: build
        run: npm run build

      - name: configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: sync to S3
        run: |
          aws s3 sync ./dist/ s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}/ \
            --delete \
            --cache-control "public, max-age=300" \
            --exclude "_astro/*" \
            --exclude "*.png" \
            --exclude "*.jpg" \
            --exclude "*.webp" \
            --exclude "*.avif" \
            --exclude "*.svg"
          # Hashed assets get a long cache
          aws s3 sync ./dist/ s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}/ \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*" \
            --include "_astro/*" \
            --include "*.png" \
            --include "*.jpg" \
            --include "*.webp" \
            --include "*.avif" \
            --include "*.svg"

      - name: invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "${{ env.INVALIDATION_PATHS }}"
