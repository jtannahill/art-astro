name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Daily auto-deploy after the upstream art-daily-pipeline runs at
  # 06:00 UTC. Fires at 07:17 UTC (off the :00 mark to avoid the
  # GH-Actions cron stampede that delays runs at round times). The
  # build re-pulls DynamoDB so new pieces and palettes appear without
  # any human push.
  schedule:
    - cron: "17 7 * * *"

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  S3_BUCKET: art-generator-216890068001
  S3_PREFIX: site
  CLOUDFRONT_DISTRIBUTION_ID: E1ZBBUI25FIV7
  INVALIDATION_PATHS: /*

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1
      PUBLIC_MAPBOX_TOKEN: ${{ secrets.PUBLIC_MAPBOX_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: pull data
        # Pull DynamoDB → src/data/generated/*.json BEFORE type-check
        # so Content Collections (which reference those files) resolve.
        run: npm run pull-data

      - name: type-check
        # astro check validates .astro/.ts files. Failing here keeps a
        # broken build out of S3.
        run: npx astro check

      - name: build
        # Skip pull-data inside this step (already done above).
        run: npm run build:no-pull

      - uses: astral-sh/setup-uv@v5

      - name: backfill thumbnails
        # Self-healing: the art-image-resize Lambda emits
        # preview-{480,960,1920}.webp on each new piece but not yet the
        # 1200px og:image variant. Generate any missing WebP variants
        # (usually just today's ~10 pieces) before the HTML referencing
        # them goes live. Never fails the deploy (PNG fallback covers
        # stragglers).
        run: uv run --no-project --with pillow --with boto3 python scripts/backfill-thumbs.py

      - name: deploy
        run: |
          # Sanity: confirm credentials are valid before any S3 work
          aws sts get-caller-identity --output text
          # NOTE: --delete is intentionally NOT used. The S3 prefix also
          # holds pipeline-written assets (preview-2048.png, satellite
          # palettes, etc.) that this build does not regenerate.
          aws s3 sync ./dist/ s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}/ \
            --cache-control "public, max-age=300" \
            --exclude "_astro/*" \
            --exclude "*.png" \
            --exclude "*.jpg" \
            --exclude "*.webp" \
            --exclude "*.avif" \
            --exclude "*.svg"
          aws s3 sync ./dist/ s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}/ \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*" \
            --include "_astro/*" \
            --include "*.png" \
            --include "*.jpg" \
            --include "*.webp" \
            --include "*.avif" \
            --include "*.svg"
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "${{ env.INVALIDATION_PATHS }}"
