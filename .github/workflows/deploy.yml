name: deploy preview

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  S3_BUCKET: art-generator-216890068001
  S3_PREFIX: site/next
  CLOUDFRONT_DISTRIBUTION_ID: E1ZBBUI25FIV7
  INVALIDATION_PATHS: /next/*

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: build
        run: npm run build

      - name: debug secret shape
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          echo "akid_len=${#AWS_ACCESS_KEY_ID}  (expected 20)"
          echo "akid_prefix=${AWS_ACCESS_KEY_ID:0:4}"
          echo "sk_len=${#AWS_SECRET_ACCESS_KEY}  (expected 40)"
          # Bash uses backslash-escape in printf; show raw byte count via wc
          printf '%s' "$AWS_ACCESS_KEY_ID" | wc -c | xargs -I{} echo "akid_bytes={}"
          printf '%s' "$AWS_SECRET_ACCESS_KEY" | wc -c | xargs -I{} echo "sk_bytes={}"

      - name: deploy
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}
        run: |
          # Sanity: confirm credentials are valid before any S3 work
          aws sts get-caller-identity --output text
          # Sync everything except hashed assets with a short cache
          aws s3 sync ./dist/ s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}/ \
            --delete \
            --cache-control "public, max-age=300" \
            --exclude "_astro/*" \
            --exclude "*.png" \
            --exclude "*.jpg" \
            --exclude "*.webp" \
            --exclude "*.avif" \
            --exclude "*.svg"
          # Hashed/binary assets get a long cache
          aws s3 sync ./dist/ s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}/ \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*" \
            --include "_astro/*" \
            --include "*.png" \
            --include "*.jpg" \
            --include "*.webp" \
            --include "*.avif" \
            --include "*.svg"
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "${{ env.INVALIDATION_PATHS }}"
